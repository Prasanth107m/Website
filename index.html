<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For Vihaan & Vithun - Super Fun Surprise!</title>
    <link href="https://fonts.googleapis.com/css2?family=Bubblegum+Sans&family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            background: linear-gradient(45deg, #ff9a9e, #fad0c4, #fad0c4, #a18cd1, #fbc2eb);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            font-family: 'Bubblegum Sans', cursive;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 40px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            position: relative;
            animation: popIn 1s ease-out;
            max-width: 90vw;
            border: 5px solid #ffd93d;
        }

        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.1); }
            100% { transform: scale(1); opacity: 1; }
        }

        .wow-text {
            font-size: 1.2em;
            color: #e84393;
            animation: wowPulse 0.5s ease-in-out infinite;
            margin-bottom: 10px;
        }

        @keyframes wowPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        h1 {
            font-size: 3em;
            color: #ff6b6b;
            margin-bottom: 10px;
            text-shadow: 3px 3px 0px #ffd93d;
            animation: bounce 1s infinite, rainbow 3s linear infinite;
            background: linear-gradient(90deg, #ff6b6b, #feca57, #48dbfb, #ff9ff3, #54a0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-15px) scale(1.05); }
        }

        @keyframes rainbow {
            0% { filter: hue-rotate(0deg); }
            100% { filter: hue-rotate(360deg); }
        }

        .subtitle {
            font-size: 1.5em;
            color: #6c5ce7;
            margin-bottom: 25px;
            font-family: 'Comic Neue', cursive;
            animation: slideIn 1s ease-out 0.5s both;
        }

        @keyframes slideIn {
            from { transform: translateX(-100px); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .characters {
            display: flex;
            justify-content: center;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }

        .character {
            font-size: 2.5em;
            animation: characterBounce 2s ease-in-out infinite;
            cursor: pointer;
            transition: transform 0.3s;
            position: relative;
        }

        .character:hover {
            transform: scale(1.3) rotate(10deg);
        }

        .character:nth-child(1) { animation-delay: 0s; }
        .character:nth-child(2) { animation-delay: 0.3s; }
        .character:nth-child(3) { animation-delay: 0.6s; }
        .character:nth-child(4) { animation-delay: 0.9s; }
        .character:nth-child(5) { animation-delay: 1.2s; }

        @keyframes characterBounce {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            50% { transform: translateY(-15px) rotate(5deg); }
        }

        .names {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 30px 0;
            flex-wrap: wrap;
        }

        .name-card {
            padding: 25px 35px;
            border-radius: 20px;
            font-size: 2em;
            font-weight: bold;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            animation: float 3s ease-in-out infinite, glow 2s ease-in-out infinite alternate;
            cursor: pointer;
            transition: all 0.3s;
            position: relative;
            overflow: hidden;
        }

        .name-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: linear-gradient(45deg, transparent, rgba(255,255,255,0.3), transparent);
            transform: rotate(45deg);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .name-card:first-child {
            background: linear-gradient(145deg, #ffeaa7, #fdcb6e);
            color: #d63031;
            box-shadow: 0 10px 30px rgba(214, 48, 49, 0.3);
        }

        .name-card:last-child {
            background: linear-gradient(145deg, #81ecec, #00cec9);
            color: #0984e3;
            box-shadow: 0 10px 30px rgba(0, 206, 201, 0.3);
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); }
            25% { transform: translateY(-20px) rotate(-2deg); }
            75% { transform: translateY(-10px) rotate(2deg); }
        }

        @keyframes glow {
            0% { box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
            100% { box-shadow: 0 15px 40px rgba(255, 200, 100, 0.5), 0 0 20px rgba(255, 200, 100, 0.3); }
        }

        .name-card:hover {
            transform: scale(1.15) rotate(5deg) !important;
        }

        .name-card:active {
            transform: scale(1.3) !important;
        }

        .hearts {
            font-size: 2.5em;
            margin: 20px 0;
            animation: heartbeat 0.8s infinite;
        }

        @keyframes heartbeat {
            0%, 100% { transform: scale(1); }
            25% { transform: scale(1.3); }
            50% { transform: scale(1); }
            75% { transform: scale(1.3); }
        }

        .message {
            font-size: 1.2em;
            color: #2d3436;
            line-height: 1.8;
            max-width: 400px;
            margin: 20px auto;
            animation: fadeIn 1s ease-out 1s both;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .stars {
            position: absolute;
            font-size: 1.8em;
            animation: twinkle 1.5s infinite, floatStar 4s ease-in-out infinite;
        }

        .star1 { top: 5px; left: 5px; animation-delay: 0s, 0s; }
        .star2 { top: 5px; right: 5px; animation-delay: 0.5s, 1s; }
        .star3 { bottom: 5px; left: 5px; animation-delay: 1s, 2s; }
        .star4 { bottom: 5px; right: 5px; animation-delay: 1.5s, 3s; }

        @keyframes twinkle {
            0%, 100% { opacity: 1; transform: scale(1) rotate(0deg); }
            50% { opacity: 0.3; transform: scale(0.7) rotate(180deg); }
        }

        @keyframes floatStar {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .balloons {
            position: fixed;
            font-size: 3em;
            animation: balloonFloat 8s linear infinite;
            pointer-events: none;
            z-index: -1;
        }

        @keyframes balloonFloat {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(20deg); opacity: 0.8; }
        }

        .confetti {
            position: fixed;
            width: 12px;
            height: 12px;
            top: -20px;
            animation: fall 3s linear infinite;
            pointer-events: none;
        }

        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg) scale(1); opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg) scale(0.5); opacity: 0; }
        }

        .rainbow {
            position: absolute;
            top: -30px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 2em;
            animation: rainbowSpin 4s linear infinite;
        }

        @keyframes rainbowSpin {
            0% { transform: translateX(-50%) rotate(0deg) scale(1); }
            50% { transform: translateX(-50%) rotate(180deg) scale(1.2); }
            100% { transform: translateX(-50%) rotate(360deg) scale(1); }
        }

        .sparkle {
            position: absolute;
            width: 20px;
            height: 20px;
            background: radial-gradient(circle, #fff, transparent);
            border-radius: 50%;
            animation: sparkle 1s ease-out forwards;
            pointer-events: none;
        }

        @keyframes sparkle {
            0% { transform: scale(0); opacity: 1; }
            50% { transform: scale(2); opacity: 0.8; }
            100% { transform: scale(0); opacity: 0; }
        }

        .floating-character {
            position: fixed;
            font-size: 3em;
            animation: floatChar 10s linear infinite;
            pointer-events: none;
            z-index: 1;
        }

        @keyframes floatChar {
            0% { transform: translateY(100vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(-100px) rotate(10deg); opacity: 0.8; }
        }

        .mascot {
            position: absolute;
            font-size: 2em;
            animation: mascotWiggle 1s ease-in-out infinite;
        }

        .mascot-left { left: -40px; top: 50%; transform: translateY(-50%); }
        .mascot-right { right: -40px; top: 50%; transform: translateY(-50%); }

        @keyframes mascotWiggle {
            0%, 100% { transform: translateY(-50%) rotate(-10deg); }
            50% { transform: translateY(-50%) rotate(10deg); }
        }


        .clown {
            position: absolute;
            font-size: 2.5em;
            animation: clownDance 2s ease-in-out infinite;
        }

        .clown-1 { top: -20px; left: 20%; animation-delay: 0s; }
        .clown-2 { top: -20px; right: 20%; animation-delay: 0.5s; }
        .clown-3 { bottom: -20px; left: 10%; animation-delay: 1s; }
        .clown-4 { bottom: -20px; right: 10%; animation-delay: 1.5s; }

        @keyframes clownDance {
            0%, 100% { transform: rotate(-5deg) scale(1); }
            50% { transform: rotate(5deg) scale(1.1); }
        }

        @media (max-width: 600px) {
            .container { 
                padding: 25px 12px; 
                margin: 10px;
                border-width: 3px;
            }
            h1 { font-size: 1.8em; }
            .name-card { 
                font-size: 1.3em; 
                padding: 15px 20px; 
            }
            .names { 
                gap: 10px; 
                margin: 20px 0;
            }
            .message { font-size: 0.95em; }
            .stars { font-size: 1.2em; }
            .character { font-size: 1.6em; }
            .mascot { font-size: 1.3em; }
            .mascot-left { left: -20px; }
            .mascot-right { right: -20px; }
            .clown { font-size: 1.5em; }
            .hearts { font-size: 2em; }
            .wow-text { font-size: 1em; }
            .subtitle { font-size: 1.2em; }
            .rainbow { font-size: 1.5em; top: -20px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="rainbow">🌈</div>
        
        <span class="clown clown-1">🤡</span>
        <span class="clown clown-2">🤡</span>
        <span class="clown clown-3">🤡</span>
        <span class="clown clown-4">🤡</span>

        <span class="stars star1">⭐</span>
        <span class="stars star2">✨</span>
        <span class="stars star3">🌟</span>
        <span class="stars star4">💫</span>

        <span class="mascot mascot-left">🦁</span>
        <span class="mascot mascot-right">🐼</span>
        
        <p class="wow-text">🎊 WOW! 🎊</p>
        <h1>🎉 Surprise! 🎉</h1>
        <p class="subtitle">A Special Page Just For You!</p>
        
        <div class="characters">
            <span class="character">🐶</span>
            <span class="character">🐱</span>
            <span class="character">🐰</span>
            <span class="character">🐻</span>
            <span class="character">🦄</span>
        </div>
        
        <div class="names">
            <div class="name-card">Vihaan</div>
            <div class="name-card">Vithun</div>
        </div>
        
        <div class="hearts">💖💖💖</div>
        
        <p class="message">
            Two little stars who brighten every day!<br>
            Vihaan & Vithun, you are amazing!<br>
            Keep smiling, keep shining!<br>
            You are loved more than you know! 🌈
        </p>
        
    <script>
        const colors = ['#ff6b6b', '#feca57', '#48dbfb', '#ff9ff3', '#54a0ff', '#5f27cd', '#00b894', '#e17055'];
        const charEmojis = ['🦁', '🐼', '🐨', '🐯', '🐸', '🦋', 'horse', '🐙'];
        
        function createConfetti() {
            const confetti = document.createElement('div');
            confetti.className = 'confetti';
            confetti.style.left = Math.random() * 100 + 'vw';
            confetti.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
            confetti.style.animationDuration = (2 + Math.random() * 2) + 's';
            confetti.style.borderRadius = Math.random() > 0.5 ? '50%' : '3px';
            confetti.style.width = (8 + Math.random() * 10) + 'px';
            confetti.style.height = confetti.style.width;
            document.body.appendChild(confetti);
            setTimeout(() => confetti.remove(), 4500);
        }

        const balloonEmojis = ['🎈', '🎊', '🎪', '🪁'];
        function createBalloon() {
            const balloon = document.createElement('div');
            balloon.className = 'balloons';
            balloon.innerHTML = balloonEmojis[Math.floor(Math.random() * balloonEmojis.length)];
            balloon.style.left = Math.random() * 90 + 'vw';
            balloon.style.animationDuration = (6 + Math.random() * 4) + 's';
            balloon.style.fontSize = (2 + Math.random() * 2) + 'em';
            document.body.appendChild(balloon);
            setTimeout(() => balloon.remove(), 10000);
        }

        function createFloatingCharacter() {
            const char = document.createElement('div');
            char.className = 'floating-character';
            char.innerHTML = charEmojis[Math.floor(Math.random() * charEmojis.length)];
            char.style.left = Math.random() * 90 + 'vw';
            char.style.animationDuration = (8 + Math.random() * 5) + 's';
            char.style.fontSize = (2 + Math.random() * 1.5) + 'em';
            document.body.appendChild(char);
            setTimeout(() => char.remove(), 14000);
        }

        setInterval(createConfetti, 200);
        setInterval(createBalloon, 3000);
        setInterval(createFloatingCharacter, 4000);

        document.querySelectorAll('.character').forEach(char => {
            char.addEventListener('click', (e) => {
                createSparkles(e);
                char.style.transform = 'scale(1.5) rotate(20deg)';
                setTimeout(() => char.style.transform = '', 300);
            });
        });

        document.querySelectorAll('.name-card').forEach(card => {
            card.addEventListener('click', (e) => {
                createSparkles(e);
                card.style.transform = 'scale(1.4) rotate(15deg)';
                playSound();
                setTimeout(() => card.style.transform = '', 400);
            });
        });

        document.querySelectorAll('.mascot').forEach(mascot => {
            mascot.addEventListener('click', (e) => {
                createSparkles(e);
                mascot.style.transform = 'translateY(-50%) scale(1.4)';
                playSound();
                setTimeout(() => mascot.style.transform = '', 300);
            });
        });

        function createSparkles(e) {
            for (let i = 0; i < 8; i++) {
                const sparkle = document.createElement('div');
                sparkle.className = 'sparkle';
                sparkle.style.left = e.clientX + 'px';
                sparkle.style.top = e.clientY + 'px';
                sparkle.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
                document.body.appendChild(sparkle);
                setTimeout(() => sparkle.remove(), 1000);
            }
        }

        function playSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const oscillator = audioCtx.createOscillator();
                const gainNode = audioCtx.createGain();
                oscillator.connect(gainNode);
                gainNode.connect(audioCtx.destination);
                oscillator.frequency.value = 800 + Math.random() * 400;
                oscillator.type = 'sine';
                gainNode.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.3);
                oscillator.start();
                oscillator.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        window.addEventListener('load', () => {
            for (let i = 0; i < 5; i++) {
                setTimeout(createBalloon, i * 500);
            }
            for (let i = 0; i < 3; i++) {
                setTimeout(createFloatingCharacter, i * 1000);
            }
        });
    </script>
</body>
</html>
